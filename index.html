<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Draggable.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#2d6a4f;font-family:"Segoe UI",sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;}

#ui{width:100%;max-width:720px;padding:16px 16px 0;display:flex;flex-direction:column;align-items:center;gap:8px;}

#ui h1{color:#fff;font-size:24px;font-weight:700;text-align:center;}
#ui p#instruction{color:#fff;font-size:14px;text-align:center;min-height:20px;padding:0 8px;}
#picks-row{display:flex;gap:8px;align-items:center;}
#dots{display:flex;gap:5px;}
.pick-dot{width:20px;height:28px;border-radius:4px;background:#fff;border:2px solid #1d4ed8;display:flex;align-items:center;justify-content:center;font-size:12px;color:#1d4ed8;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.2);transition:opacity .3s,filter .3s;}
.pick-dot.used{opacity:.3;filter:grayscale(1);}
#picks-label{color:#fff;font-size:12px;margin-left:2px;}

#stage{position:relative;width:100%;max-width:720px;height:340px;}
#deck-area{position:absolute;bottom:0;left:0;right:0;height:240px;display:flex;justify-content:center;align-items:flex-end;}
#revealed-area{position:absolute;top:0;left:0;right:0;height:180px;pointer-events:none;}

.card{position:absolute;width:84px;height:118px;border-radius:10px;cursor:pointer;transform-origin:bottom center;transform-style:preserve-3d;user-select:none;-webkit-tap-highlight-color:transparent;}
.card.picked{cursor:default;pointer-events:none}
.card.highlighted .card-back{box-shadow:0 0 18px rgba(37,99,235,.75)!important;}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .6s cubic-bezier(.4,0,.2,1);}
.card.flipped .card-inner{transform:rotateY(180deg)}
.card-front,.card-back{position:absolute;width:100%;height:100%;border-radius:10px;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px;}
.card-back{background:repeating-linear-gradient(45deg,#2563eb,#2563eb 10px,#1d4ed8 10px,#1d4ed8 20px);border:2px solid #93c5fd;box-shadow:0 4px 14px rgba(37,99,235,.3);}
.card-back-pip{width:60%;height:60%;border:2px solid #93c5fd;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#bfdbfe;font-size:26px;}
.card-front{background:#fff;border:2px solid #2563eb;transform:rotateY(180deg);box-shadow:0 4px 14px rgba(0,0,0,.12);text-align:center;gap:4px;}
.prize-icon{font-size:22px;line-height:1}
.prize-name{font-size:10px;font-weight:700;color:#1a1a2e;line-height:1.25;text-align:center}
.prize-val{font-size:10px;color:#2563eb;font-weight:600}
.prize-extra{font-size:9px;color:#16a34a;font-weight:700;margin-top:2px;line-height:1.2}

.rev-card{position:absolute;border-radius:12px;background:#fff;border:2px solid #2563eb;box-shadow:0 6px 24px rgba(37,99,235,.2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px;text-align:center;pointer-events:none;opacity:0;width:100px;height:140px;}
.rev-icon{font-size:26px;line-height:1}
.rev-name{font-size:11px;font-weight:700;color:#1a1a2e;line-height:1.3}
.rev-val{font-size:11px;color:#2563eb;font-weight:600}
.rev-extra{font-size:10px;color:#16a34a;font-weight:700;margin-top:2px}
.card:not(.picked):not(.highlighted):hover .card-back{box-shadow:0 0 16px rgba(37,99,235,.6);}

#log-area{width:100%;max-width:720px;padding:0 16px 20px;margin-top:4px;}
#log-title{color:#fff;font-size:12px;margin-bottom:5px;font-weight:600;letter-spacing:.5px;}
#log{display:flex;flex-direction:column;gap:5px}
.log-entry{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:7px 12px;color:#374151;font-size:13px;display:flex;align-items:center;gap:8px;animation:fadeIn .4s ease;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.log-icon{font-size:15px}
.log-prize{font-weight:600;color:#2563eb}
.log-extra{color:#16a34a;font-size:11px;margin-left:4px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center;padding:20px;}
#modal-box{background:#fff;border-radius:16px;max-width:460px;width:100%;padding:32px 24px;text-align:center;transform:scale(0.8);opacity:0;transition:transform .45s cubic-bezier(.34,1.56,.64,1),opacity .3s ease;box-shadow:0 20px 60px rgba(0,0,0,.25);}
#modal-box h2{color:#1a1a2e;font-size:22px;font-weight:700;margin:10px 0 16px;}
#modal-prizes{font-size:14px;line-height:1.9;margin-bottom:20px;}
.prize-pill{display:inline-block;background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;padding:4px 10px;margin:3px 4px;color:#1d4ed8;font-weight:600;}
#modal-sub,#modal-tagline{color:#1a1a2e;font-size:15px;font-weight:600;margin-bottom:6px;}
#modal-tagline{margin-bottom:24px;}
#modal-btn{background:#2563eb;color:#fff;border:none;border-radius:8px;padding:12px 28px;font-size:14px;font-weight:600;cursor:pointer;width:100%;}
#modal-btn:hover{background:#1d4ed8;}

@media(max-width:500px){
  #ui h1{font-size:20px}
  #stage{height:280px}
  #deck-area{height:200px}
  #revealed-area{height:150px}
  .card{width:62px;height:87px;}
  .card-back-pip{font-size:18px}
  .rev-card{width:80px;height:112px;}
  .rev-icon{font-size:20px}
  .rev-name,.rev-val{font-size:9px}
  .rev-extra{font-size:8px}
  #modal-box{padding:24px 16px}
  #modal-box h2{font-size:18px}
}
</style>
</head>
<body>

<div id="ui">
  <h1>Welcome Bonus</h1>
  <p id="instruction">Pick 2 Cards and Win their Prizes!</p>
  <div id="picks-row">
    <div id="dots"></div>
    <span id="picks-label">picks remaining</span>
  </div>
</div>

<div id="stage">
  <div id="revealed-area"></div>
  <div id="deck-area"></div>
</div>

<div id="log-area">
  <div id="log-title">YOUR PRIZES</div>
  <div id="log"></div>
</div>

<div id="modal-overlay">
  <div id="modal-box">
    <div style="font-size:38px">🎉</div>
    <h2>You've Won!</h2>
    <div id="modal-prizes"></div>
    <p id="modal-sub">These prizes have been added to your account.</p>
    <p id="modal-tagline">Keep up the winning! 🏆</p>
    <button id="modal-btn" onclick="closeModal()">Go to your Account</button>
  </div>
</div>

<script>
const PRIZES=[
  {label:"1 Free Entry",sub:"(£0.50 value)",icon:"🎟",extra:false},
  {label:"5 Free Entries",sub:"(£2.50 value)",icon:"🎟",extra:false},
  {label:"£1.00 Bonus Credit",sub:"",icon:"💰",extra:false},
  {label:"£5.00 Bonus Credit",sub:"",icon:"💰",extra:false},
  {label:"Instant Silver VIP Status",sub:"",icon:"⭐",extra:false},
  {label:"£3.00 Free Insta-Draw Credits",sub:"",icon:"🎰",extra:false},
  {label:"1 Free Entry",sub:"(£0.50 value)",icon:"🎟",extra:true},
  {label:"1 Free Entry",sub:"(£0.50 value)",icon:"🎟",extra:true},
  {label:"1 Free Entry",sub:"(£0.50 value)",icon:"🎟",extra:true},
  {label:"£1.00 Bonus Credit",sub:"",icon:"💰",extra:false},
  {label:"£1.00 Bonus Credit",sub:"",icon:"💰",extra:false},
  {label:"1 Free Entry",sub:"(£0.50 value)",icon:"🎟",extra:false},
  {label:"5 Free Entries",sub:"(£2.50 value)",icon:"🎟",extra:false},
];

const isTouchDevice=()=>window.matchMedia("(hover:none)").matches;
let picksRemaining=2,totalPicks=2,pickCount=0,gameOver=false,wonPrizes=[],cardData=[],highlightedCard=null;

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function updateDots(){
  const dots=document.getElementById("dots");
  dots.innerHTML="";
  for(let i=0;i<totalPicks;i++){
    const d=document.createElement("div");
    d.className="pick-dot"+(i>=picksRemaining?" used":"");
    d.textContent="♠";
    dots.appendChild(d);
  }
  document.getElementById("picks-label").textContent=picksRemaining===1?"pick remaining":"picks remaining";
}

function setInstruction(t){document.getElementById("instruction").textContent=t;}

function addLog(prize,n){
  const el=document.createElement("div");
  el.className="log-entry";
  const full=prize.label+(prize.sub?" "+prize.sub:"");
  el.innerHTML=`<span class="log-icon">${prize.icon}</span><span>Pick ${n}: <span class="log-prize">${full}</span>${prize.extra?'<span class="log-extra">+ Extra Pick!</span>':''}</span>`;
  document.getElementById("log").appendChild(el);
}

function showWinModal(){
  document.getElementById("modal-prizes").innerHTML=wonPrizes.map(p=>`<span class="prize-pill">${p.icon} ${p.label}${p.sub?" "+p.sub:""}</span>`).join("");
  const overlay=document.getElementById("modal-overlay"),box=document.getElementById("modal-box");
  overlay.style.display="flex";
  box.style.transform="scale(0.8)";box.style.opacity="0";
  setTimeout(()=>{box.style.transform="scale(1)";box.style.opacity="1";},30);
}

function closeModal(){
  const box=document.getElementById("modal-box");
  box.style.transform="scale(0.8)";box.style.opacity="0";
  setTimeout(()=>{document.getElementById("modal-overlay").style.display="none";init();},350);
}

function repositionRevealedCards(){
  const cards=document.querySelectorAll(".rev-card");
  const n=cards.length;
  if(!n)return;
  const stageW=document.getElementById("stage").getBoundingClientRect().width;
  const cardW=cards[0].offsetWidth||100;
  const gap=10;
  const totalW=n*cardW+(n-1)*gap;
  const startX=stageW/2-totalW/2;
  cards.forEach((rc,i)=>gsap.to(rc,{left:startX+i*(cardW+gap)+"px",top:"6px",duration:0.35,ease:"power2.out"}));
}

function spawnRevealedCard(prize,deckCardEl){
  const deckRect=deckCardEl.getBoundingClientRect();
  const stageRect=document.getElementById("stage").getBoundingClientRect();
  const rc=document.createElement("div");
  rc.className="rev-card";
  rc.innerHTML=`<div class="rev-icon">${prize.icon}</div><div class="rev-name">${prize.label}${prize.sub?`<br><span class="rev-val">${prize.sub}</span>`:""}</div>${prize.extra?`<div class="rev-extra">+ EXTRA PICK!</div>`:""}`;
  rc.style.left=(deckRect.left-stageRect.left+deckRect.width/2-50)+"px";
  rc.style.top=(deckRect.top-stageRect.top+deckRect.height/2-70)+"px";
  document.getElementById("stage").appendChild(rc);
  gsap.fromTo(rc,{opacity:0,rotation:gsap.getProperty(deckCardEl,"rotation"),scale:0.7},{opacity:1,rotation:0,scale:1,duration:0.55,ease:"power3.out",onComplete:repositionRevealedCards});
  repositionRevealedCards();
}

function liftCard(cardEl,angle){
  const rad=(angle-90)*Math.PI/180;
  gsap.to(cardEl,{x:Math.cos(rad)*22,y:Math.sin(rad)*22,duration:0.2,ease:"power2.out"});
}
function lowerCard(cardEl){gsap.to(cardEl,{x:0,y:0,duration:0.2,ease:"power2.in"});}

function pickCard(cardEl,prize,angle){
  if(gameOver||picksRemaining<=0||cardEl.classList.contains("picked"))return;
  if(highlightedCard&&highlightedCard!==cardEl){highlightedCard.classList.remove("highlighted");lowerCard(highlightedCard);}
  highlightedCard=null;
  cardEl.classList.add("picked");
  gsap.timeline()
    .to(cardEl,{y:gsap.getProperty(cardEl,"y")-50,duration:0.22,ease:"power2.out"})
    .to(cardEl,{y:0,x:0,duration:0.18,ease:"power2.in"},"+=0.05")
    .set(cardEl,{opacity:0});
  setTimeout(()=>{cardEl.classList.add("flipped");},80);
  wonPrizes.push(prize);
  pickCount++;
  const thisPick=pickCount;
  picksRemaining--;
  if(prize.extra){picksRemaining++;totalPicks++;}
  setTimeout(()=>{spawnRevealedCard(prize,cardEl);},300);
  setTimeout(()=>{addLog(prize,thisPick);updateDots();},500);
  setTimeout(()=>{
    if(picksRemaining<=0){gameOver=true;setInstruction("All done! See your prizes below.");setTimeout(showWinModal,500);}
    else{setInstruction(prize.extra?`Extra pick awarded! ${picksRemaining} pick${picksRemaining>1?"s":""} remaining — choose your next card.`:`Nice! ${picksRemaining} pick${picksRemaining>1?"s":""} remaining — choose your next card.`);}
  },550);
}

function init(){
  picksRemaining=2;totalPicks=2;pickCount=0;gameOver=false;wonPrizes=[];highlightedCard=null;
  document.getElementById("log").innerHTML="";
  setInstruction("Pick 2 Cards and Win their Prizes!");
  document.querySelectorAll(".rev-card").forEach(e=>e.remove());
  const deckArea=document.getElementById("deck-area");
  deckArea.innerHTML="";
  cardData=[];
  const prizes=shuffle(PRIZES);
  const total=prizes.length;
  const mobile=window.innerWidth<=500;
  const spread=mobile?110:150;
  const startAngle=-spread/2;
  prizes.forEach((prize,i)=>{
    const card=document.createElement("div");
    card.className="card";
    const angle=startAngle+(spread/(total-1))*i;
    gsap.set(card,{x:0,y:0,rotation:angle,transformOrigin:"bottom center"});
    const inner=document.createElement("div");inner.className="card-inner";
    const back=document.createElement("div");back.className="card-back";back.innerHTML=`<div class="card-back-pip">♠</div>`;
    const front=document.createElement("div");front.className="card-front";
    front.innerHTML=`<div class="prize-icon">${prize.icon}</div><div class="prize-name">${prize.label}</div>${prize.sub?`<div class="prize-val">${prize.sub}</div>`:""}${prize.extra?`<div class="prize-extra">+ EXTRA PICK</div>`:""}`;
    inner.appendChild(back);inner.appendChild(front);card.appendChild(inner);
    deckArea.appendChild(card);
    cardData.push({card,prize,angle});
    if(isTouchDevice()){
      card.addEventListener("click",()=>{
        if(gameOver||picksRemaining<=0||card.classList.contains("picked"))return;
        if(highlightedCard===card){pickCard(card,prize,angle);}
        else{if(highlightedCard){highlightedCard.classList.remove("highlighted");lowerCard(highlightedCard);}highlightedCard=card;card.classList.add("highlighted");liftCard(card,angle);setInstruction("Tap again to reveal this card!");}
      });
    } else {
      card.addEventListener("mouseenter",()=>{if(!card.classList.contains("picked")&&!gameOver)liftCard(card,angle);});
      card.addEventListener("mouseleave",()=>{if(!card.classList.contains("picked"))lowerCard(card);});
      card.addEventListener("click",()=>pickCard(card,prize,angle));
    }
  });
  updateDots();
}

init();
</script>
</body>
</html>
