<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Monoton&family=Limelight&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Draggable.min.js"></script>
<style>
:root{--cs:1}
*{box-sizing:border-box;margin:0;padding:0}
body{background-color:#2a6347;background-image:radial-gradient(ellipse at 50% 25%,rgba(80,155,100,.22) 0%,transparent 55%),radial-gradient(ellipse at 10% 90%,rgba(10,32,20,.35) 0%,transparent 40%),radial-gradient(ellipse at 90% 90%,rgba(10,32,20,.35) 0%,transparent 40%),repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(0,0,0,.045) 4px,rgba(0,0,0,.045) 5px),repeating-linear-gradient(135deg,transparent,transparent 4px,rgba(0,0,0,.045) 4px,rgba(0,0,0,.045) 5px);font-family:"Segoe UI",sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;}

/* Top section spacing */
#ui {
  width:100%;max-width:720px;display:flex;flex-direction:column;align-items:center;gap:8px;
  text-align: center;
  padding-top: 8px;
  padding-bottom: 0;
}

/* Neon retro-casino marquee headline */
#ui h1 {
  font-family: 'Monoton', 'Limelight', sans-serif;
  font-weight: 400;
  font-size: clamp(38px, 6.6vw, 62px);
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #FFF4D6;
  margin: 4px 0 10px;
  line-height: 1.05;
  text-shadow:
    0 0 4px #FFEFAF,
    0 0 10px #FFC857,
    0 0 22px #FF8A2A,
    0 0 38px #FF4D8D,
    0 0 60px #FF2E88;
  animation: neonFlicker 3.2s infinite alternate;
}

@keyframes neonFlicker {
  0%, 92%, 100% {
    text-shadow:
      0 0 4px #FFEFAF,
      0 0 10px #FFC857,
      0 0 22px #FF8A2A,
      0 0 38px #FF4D8D,
      0 0 60px #FF2E88;
    opacity: 1;
  }
  94% { text-shadow: 0 0 3px #FFEFAF, 0 0 7px #FFC857; opacity: 0.86; }
  96% { opacity: 1; }
  98% { text-shadow: 0 0 2px #FFEFAF, 0 0 6px #FFC857; opacity: 0.78; }
}

/* Subheadline: Limelight (Art Deco) with gold flourish underlines */
#ui #instruction {
  font-family: 'Limelight', serif;
  font-weight: 400;
  font-size: clamp(24px, 3.8vw, 34px);
  color: #FFE9B0;
  margin: 0 auto 8px;
  letter-spacing: 1.5px;
  line-height: 1.2;
  display: inline-block;
  position: relative;
  padding: 2px 26px 10px;
  text-shadow: 0 1px 0 rgba(0, 0, 0, 0.35), 0 0 12px rgba(255, 205, 120, 0.35);
  /* always reserve 3 lines so layout never shifts on text changes */
  min-height: calc(clamp(24px, 3.8vw, 34px) * 3.6 + 12px);
}
#ui #instruction::before,
#ui #instruction::after {
  content: "";
  position: absolute;
  bottom: 2px;
  width: 40px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #FFD65A, transparent);
  border-radius: 2px;
}
#ui #instruction::before { left: -10px; }
#ui #instruction::after  { right: -10px; }

/* Picks row stacked: empty card-shaped slots with label below */
#ui #picks-row {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 0;
}
#ui #dots {
  display: inline-flex;
  gap: 14px;
}
#ui .pick-dot {
  width: 84px;
  height: 118px;
  border-radius: 10px;
  background:
    radial-gradient(ellipse at center, rgba(255, 200, 90, 0.08), transparent 60%),
    rgba(0, 0, 0, 0.22);
  border: 2px dashed rgba(255, 214, 90, 0.8);
  box-shadow:
    inset 0 0 22px rgba(0, 0, 0, 0.35),
    0 0 14px rgba(255, 180, 60, 0.18);
  color: transparent;
  font-size: 0;
  display: inline-block;
}
#ui .pick-dot.used {
  border-style: solid;
  border-color: rgba(255, 214, 90, 0.25);
  background: rgba(0, 0, 0, 0.08);
  opacity: 0.55;
  box-shadow: none;
}
#ui .pick-dot.in-flight {
  border-style: dashed;
  border-color: rgba(255, 214, 90, 1);
  animation: slotPulse 0.6s ease-in-out infinite alternate;
}
@keyframes slotPulse {
  from { box-shadow: inset 0 0 22px rgba(0,0,0,.35), 0 0 14px rgba(255,180,60,.18); }
  to   { box-shadow: inset 0 0 22px rgba(0,0,0,.35), 0 0 30px rgba(255,180,60,.6); }
}
#ui .pick-dot.filled {
  border-style: solid;
  border-color: #2563eb;
  background: #fff;
  box-shadow: 0 4px 14px rgba(37,99,235,.2);
  opacity: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 6px 4px;
  color: #1a1a2e;
}
#ui .pick-dot.filled .pd-icon { font-size: calc(22px * var(--cs)); line-height: 1; }
#ui .pick-dot.filled .pd-name { font-size: calc(9px * var(--cs)); font-weight: 700; color: #1a1a2e; line-height: 1.2; text-align: center; word-break: break-word; }

/* Neon pill label */
#ui #picks-label {
  font-family: 'Limelight', serif;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: #FFE9B0;
  font-weight: 400;
  padding: 6px 14px;
  border: 1px solid rgba(255, 214, 90, 0.55);
  border-radius: 999px;
  background: rgba(0, 0, 0, 0.3);
  box-shadow:
    0 0 10px rgba(255, 180, 60, 0.35),
    inset 0 0 8px rgba(255, 180, 60, 0.18);
  margin-top: 6px;
}

/* Pull the stage up to condense the space between picks-remaining and the fan */
#stage { position:relative;width:100%;max-width:720px;margin-top: -10px; }
#deck-area{position:absolute;bottom:0;left:0;right:0;height:240px;display:flex;justify-content:center;align-items:flex-end;}
#revealed-area{position:absolute;top:0;left:0;right:0;height:180px;pointer-events:none;}

.card{position:absolute;width:calc(84px * var(--cs));height:calc(118px * var(--cs));border-radius:10px;cursor:pointer;transform-origin:bottom center;transform-style:preserve-3d;user-select:none;-webkit-tap-highlight-color:transparent;}
.card.picked{cursor:default;pointer-events:none}
.card.highlighted .card-back{box-shadow:0 0 18px rgba(37,99,235,.75)!important;}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .6s cubic-bezier(.4,0,.2,1);}
.card.flipped .card-inner{transform:rotateY(180deg)}
.card-front,.card-back{position:absolute;width:100%;height:100%;border-radius:10px;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px;}
.card-back{background:repeating-linear-gradient(45deg,#2563eb,#2563eb 10px,#1d4ed8 10px,#1d4ed8 20px);border:2px solid #93c5fd;box-shadow:0 4px 14px rgba(37,99,235,.3);}
.card-back-pip{width:60%;height:60%;border:2px solid #93c5fd;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#bfdbfe;font-size:calc(26px * var(--cs));}
.card-front{background:#fff;border:2px solid #2563eb;transform:rotateY(180deg);box-shadow:0 4px 14px rgba(0,0,0,.12);text-align:center;gap:4px;}
.prize-icon{font-size:calc(22px * var(--cs));line-height:1}
.prize-name{font-size:calc(10px * var(--cs));font-weight:700;color:#1a1a2e;line-height:1.25;text-align:center}
.prize-val{font-size:calc(10px * var(--cs));color:#2563eb;font-weight:600}
.prize-extra{font-size:calc(9px * var(--cs));color:#16a34a;font-weight:700;margin-top:2px;line-height:1.2}

.rev-card{position:absolute;border-radius:12px;background:#fff;border:2px solid #2563eb;box-shadow:0 6px 24px rgba(37,99,235,.2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px;text-align:center;pointer-events:none;opacity:0;width:calc(100px * var(--cs));height:calc(140px * var(--cs));}
.rev-icon{font-size:calc(26px * var(--cs));line-height:1}
.rev-name{font-size:calc(11px * var(--cs));font-weight:700;color:#1a1a2e;line-height:1.3}
.rev-val{font-size:calc(11px * var(--cs));color:#2563eb;font-weight:600}
.rev-extra{font-size:calc(10px * var(--cs));color:#16a34a;font-weight:700;margin-top:2px}
.card:not(.picked):not(.highlighted):hover .card-back{box-shadow:0 0 16px rgba(37,99,235,.6);}


#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center;padding:20px;}
#modal-box{background:#fff;border-radius:16px;max-width:460px;width:100%;padding:32px 24px;text-align:center;transform:scale(0.8);opacity:0;transition:transform .45s cubic-bezier(.34,1.56,.64,1),opacity .3s ease;box-shadow:0 20px 60px rgba(0,0,0,.25);}
#modal-box h2{color:#1a1a2e;font-size:22px;font-weight:700;margin:10px 0 16px;}
#modal-prizes{font-size:14px;line-height:1.9;margin-bottom:20px;}
.prize-pill{display:inline-block;background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;padding:4px 10px;margin:3px 4px;color:#1d4ed8;font-weight:600;}
#modal-sub,#modal-tagline{color:#1a1a2e;font-size:15px;font-weight:600;margin-bottom:6px;}
#modal-tagline{margin-bottom:24px;}
#modal-btn{background:#2563eb;color:#fff;border:none;border-radius:8px;padding:12px 28px;font-size:14px;font-weight:600;cursor:pointer;width:100%;}
#modal-btn:hover{background:#1d4ed8;}

@media(max-width:500px){
  #modal-box{padding:24px 16px}
  #modal-box h2{font-size:18px}
}

/* ---------- Premium gold-foil card face ---------- */
.card-front,
.rev-card {
  background:
    radial-gradient(120% 60% at 50% 0%, rgba(255, 255, 255, 0.55), transparent 55%),
    linear-gradient(180deg, #FFF8DC 0%, #FFE7A1 38%, #FFC960 70%, #E59A2C 100%);
  border: 1px solid rgba(255, 244, 196, 0.9);
  box-shadow:
    0 0 0 2px rgba(184, 115, 20, 0.35) inset,
    0 6px 18px rgba(0, 0, 0, 0.35),
    0 0 22px rgba(255, 200, 90, 0.35);
  border-radius: 10px;
  color: #3a240a;
  font-family: 'Manrope', system-ui, sans-serif;
  overflow: hidden;
  position: relative;
  padding: 8px 6px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}
/* card-front must stay absolute inside card-inner for the 3D flip to work */
.card-front { position: absolute; }
.card-front::after,
.rev-card::after {
  content: "";
  position: absolute;
  top: -40%;
  left: -40%;
  width: 60%;
  height: 180%;
  background: linear-gradient(115deg, transparent 45%, rgba(255, 255, 255, 0.35) 50%, transparent 55%);
  pointer-events: none;
}
.card-front::before,
.rev-card::before {
  content: "♠";
  position: absolute;
  top: 4px;
  left: 6px;
  font-size: 10px;
  color: rgba(58, 36, 10, 0.55);
  font-family: serif;
  pointer-events: none;
}
.card-front .prize-icon,
.rev-card .rev-icon { font-size: 0; margin-bottom: 4px; }
.card-front .prize-icon svg,
.rev-card .rev-icon svg {
  width: 34px; height: 34px; display: block; margin: 0 auto;
  filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.25));
}
.card-front .prize-name,
.rev-card .rev-name {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 11px;
  line-height: 1.15;
  letter-spacing: 0.3px;
  color: #2a1a06;
  text-transform: uppercase;
  padding: 0 4px;
}
.card-front .prize-val,
.rev-card .rev-val {
  display: inline-block;
  margin-top: 3px;
  font-family: 'Manrope', sans-serif;
  font-weight: 700;
  font-size: 9.5px;
  letter-spacing: 0.3px;
  color: #5a3a10;
  background: rgba(255, 255, 255, 0.55);
  padding: 1px 6px;
  border-radius: 999px;
  border: 1px solid rgba(120, 70, 10, 0.25);
  text-transform: none;
}
.card-front .prize-extra,
.rev-card .rev-extra {
  position: absolute;
  bottom: 6px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(180deg, #FF4D8D 0%, #C12170 100%);
  color: #fff;
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 9px;
  letter-spacing: 0.8px;
  padding: 2px 8px;
  border-radius: 999px;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.35), 0 0 10px rgba(255, 80, 140, 0.55);
  text-transform: uppercase;
  white-space: nowrap;
}
.log-icon svg { width: 22px; height: 22px; vertical-align: middle; }
.prize-pill svg { width: 18px; height: 18px; vertical-align: middle; margin-right: 4px; flex-shrink: 0; }

/* ---------- You've Won modal ---------- */
#modal-overlay {
  background: radial-gradient(ellipse at center, rgba(10, 40, 25, 0.75), rgba(0, 0, 0, 0.88));
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
#modal-box {
  background:
    radial-gradient(120% 60% at 50% 0%, rgba(255, 200, 90, 0.12), transparent 55%),
    linear-gradient(180deg, #1A3A2A 0%, #0F2A1E 100%);
  color: #FFE9B0;
  border: 1px solid rgba(255, 214, 90, 0.55);
  border-radius: 18px;
  box-shadow:
    0 0 0 2px rgba(184, 115, 20, 0.35) inset,
    0 20px 60px rgba(0, 0, 0, 0.55),
    0 0 50px rgba(255, 180, 60, 0.25);
  padding: 28px 26px 24px;
  max-width: 440px;
  width: calc(100% - 32px);
  text-align: center;
  position: relative;
  overflow: hidden;
  font-family: 'Manrope', system-ui, sans-serif;
}
#modal-box::after {
  content: "";
  position: absolute;
  top: -30%; left: -20%;
  width: 60%; height: 160%;
  background: linear-gradient(115deg, transparent 45%, rgba(255, 255, 255, 0.05) 50%, transparent 55%);
  pointer-events: none;
}
#modal-box::before {
  content: "";
  position: absolute;
  inset: 10px;
  border-radius: 12px;
  border: 1px dashed rgba(255, 214, 90, 0.22);
  pointer-events: none;
}
#modal-box > div:first-child {
  font-size: 0;
  height: 38px;
  margin-bottom: 6px;
  position: relative;
}
#modal-box > div:first-child::before {
  content: "✦";
  display: inline-block;
  font-size: 36px;
  color: #FFD65A;
  text-shadow: 0 0 10px rgba(255, 200, 90, 0.8), 0 0 22px rgba(255, 140, 40, 0.5);
  animation: modalStarPulse 2.2s ease-in-out infinite;
}
@keyframes modalStarPulse {
  0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; }
  50% { transform: scale(1.15) rotate(8deg); opacity: 0.85; }
}
#modal-box h2 {
  font-family: 'Monoton', 'Limelight', sans-serif;
  font-weight: 400;
  font-size: clamp(28px, 5vw, 40px);
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #FFF4D6;
  margin: 4px 0 14px;
  text-shadow:
    0 0 4px #FFEFAF, 0 0 10px #FFC857,
    0 0 22px #FF8A2A, 0 0 38px #FF4D8D;
}
#modal-prizes {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin: 12px 0 18px;
}
#modal-prizes .prize-pill {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: linear-gradient(180deg, #FFF2B8 0%, #FFD15E 60%, #E59A2C 100%);
  color: #2a1a06;
  border: 1px solid rgba(120, 70, 10, 0.45);
  box-shadow:
    0 0 0 2px rgba(184, 115, 20, 0.2) inset,
    0 3px 10px rgba(0, 0, 0, 0.35);
  padding: 9px 14px;
  border-radius: 999px;
  font-family: 'Manrope', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.2px;
}
#modal-sub {
  color: rgba(255, 233, 176, 0.85);
  font-family: 'Manrope', sans-serif;
  font-size: 14px;
  line-height: 1.45;
  margin: 6px 0 2px;
}
#modal-tagline {
  color: #FFD65A;
  font-family: 'Manrope', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.3px;
  margin: 2px 0 18px;
}
#modal-btn {
  display: inline-block;
  width: auto;
  min-width: 220px;
  padding: 12px 22px;
  border-radius: 999px;
  border: 1px solid rgba(120, 70, 10, 0.5);
  background: linear-gradient(180deg, #FFF2B8 0%, #FFC960 55%, #E59A2C 100%);
  color: #2a1a06;
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 15px;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  cursor: pointer;
  box-shadow:
    0 0 0 2px rgba(184, 115, 20, 0.35) inset,
    0 4px 14px rgba(0, 0, 0, 0.4),
    0 0 22px rgba(255, 180, 60, 0.35);
  transition: transform 120ms ease, box-shadow 120ms ease, filter 120ms ease;
}
#modal-btn:hover {
  transform: translateY(-1px);
  filter: brightness(1.05);
  box-shadow:
    0 0 0 2px rgba(184, 115, 20, 0.45) inset,
    0 6px 18px rgba(0, 0, 0, 0.5),
    0 0 34px rgba(255, 180, 60, 0.5);
}
#modal-btn:active { transform: translateY(0); filter: brightness(0.98); }

/* ---------- Confetti burst (visual only) ---------- */
.confetti-layer {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 99999;
}
.confetti-piece {
  position: absolute;
  top: 15vh;
  width: 10px;
  height: 14px;
  opacity: 0;
  border-radius: 2px;
  animation: confettiFall var(--dur, 2200ms) ease-out forwards;
  animation-delay: var(--delay, 0ms);
}
@keyframes confettiFall {
  0% { transform: translate3d(0, -40vh, 0) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  100% {
    transform: translate3d(var(--dx, 0px), var(--dy, 70vh), 0) rotate(var(--rot, 540deg));
    opacity: 0;
  }
}

/* Gold-foil prize face for filled pick-dot slots */
#ui .pick-dot.filled {
  background:
    radial-gradient(120% 60% at 50% 0%, rgba(255, 255, 255, 0.55), transparent 55%),
    linear-gradient(180deg, #FFF8DC 0%, #FFE7A1 38%, #FFC960 70%, #E59A2C 100%);
  border: 1px solid rgba(255, 244, 196, 0.9);
  border-style: solid;
  box-shadow:
    0 0 0 2px rgba(184, 115, 20, 0.35) inset,
    0 6px 18px rgba(0, 0, 0, 0.35),
    0 0 22px rgba(255, 200, 90, 0.35);
  color: #2a1a06;
  overflow: hidden;
  opacity: 1;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 6px;
  font-family: 'Manrope', system-ui, sans-serif;
}

/* Diagonal shine */
#ui .pick-dot.filled::after {
  content: "";
  position: absolute;
  top: -40%;
  left: -40%;
  width: 60%;
  height: 180%;
  background: linear-gradient(115deg, transparent 45%, rgba(255, 255, 255, 0.35) 50%, transparent 55%);
  pointer-events: none;
}

/* Decorative corner pip */
#ui .pick-dot.filled::before {
  content: "♠";
  position: absolute;
  top: 4px;
  left: 6px;
  font-size: 10px;
  color: rgba(58, 36, 10, 0.55);
  font-family: serif;
  pointer-events: none;
}

/* Icon */
#ui .pick-dot.filled .pd-icon {
  font-size: 0;
  margin-bottom: 4px;
  position: relative;
  z-index: 1;
}
#ui .pick-dot.filled .pd-icon svg {
  width: 30px;
  height: 30px;
  display: block;
  filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.25));
}

/* Prize name */
#ui .pick-dot.filled .pd-name {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 10px;
  line-height: 1.15;
  letter-spacing: 0.3px;
  color: #2a1a06;
  text-transform: uppercase;
  padding: 0 2px;
  position: relative;
  z-index: 1;
}
</style>
</head>
<body>

<div id="ui">
  <h1>Unlock Your Welcome Bonus</h1>
  <p id="instruction">Select two cards</p>
  <div id="picks-row">
    <div id="dots"></div>
    <span id="picks-label">picks remaining</span>
  </div>
</div>

<div id="stage">
  <div id="revealed-area"></div>
  <div id="deck-area"></div>
</div>

<div id="modal-overlay">
  <div id="modal-box">
    <div style="font-size:38px">🎉</div>
    <h2>You've Won!</h2>
    <div id="modal-prizes"></div>
    <p id="modal-sub">These prizes have been added to your account.</p>
    <p id="modal-tagline">Keep up the winning!</p>
    <button id="modal-btn" onclick="closeModal()">Go to your Account</button>
  </div>
</div>

<script>
const TICKET_ICON = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="#3a240a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 8a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v2a2 2 0 0 0 0 4v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-2a2 2 0 0 0 0-4V8z" fill="#8a5a10" fill-opacity="0.18"/><path d="M9 6v12" stroke-dasharray="1 2"/></svg>`;

const COIN_ICON = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="#3a240a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="8" fill="#8a5a10" fill-opacity="0.18"/><text x="12" y="16" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="700" fill="#3a240a" stroke="none">£</text></svg>`;

const STAR_ICON = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="#3a240a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3l2.7 5.7 6.3.9-4.6 4.3 1.1 6.1L12 17.8 6.5 20l1.1-6.1L3 9.6l6.3-.9L12 3z" fill="#8a5a10" fill-opacity="0.18"/></svg>`;

const CHIP_ICON = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="#3a240a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="8" fill="#8a5a10" fill-opacity="0.18"/><circle cx="12" cy="12" r="3.2"/><path d="M12 4v3M12 17v3M4 12h3M17 12h3M6.3 6.3l2.1 2.1M15.6 15.6l2.1 2.1M17.7 6.3l-2.1 2.1M8.4 15.6l-2.1 2.1"/></svg>`;

const PRIZES=[
  {label:"1 Free Entry",sub:"(£0.50 value)",icon:TICKET_ICON,extra:false},
  {label:"5 Free Entries",sub:"(£2.50 value)",icon:TICKET_ICON,extra:false},
  {label:"£1.00 Bonus Credit",sub:"",icon:COIN_ICON,extra:false},
  {label:"£5.00 Bonus Credit",sub:"",icon:COIN_ICON,extra:false},
  {label:"Instant Silver VIP Status",sub:"",icon:STAR_ICON,extra:false},
  {label:"£3.00 Free Insta-Draw Credits",sub:"",icon:CHIP_ICON,extra:false},
  {label:"1 Free Entry",sub:"(£0.50 value)",icon:TICKET_ICON,extra:true},
  {label:"1 Free Entry",sub:"(£0.50 value)",icon:TICKET_ICON,extra:true},
  {label:"1 Free Entry",sub:"(£0.50 value)",icon:TICKET_ICON,extra:true},
  {label:"£1.00 Bonus Credit",sub:"",icon:COIN_ICON,extra:false},
  {label:"£1.00 Bonus Credit",sub:"",icon:COIN_ICON,extra:false},
  {label:"1 Free Entry",sub:"(£0.50 value)",icon:TICKET_ICON,extra:false},
  {label:"5 Free Entries",sub:"(£2.50 value)",icon:TICKET_ICON,extra:false},
];

const isTouchDevice=()=>window.matchMedia("(hover:none)").matches;
let picksRemaining=2,totalPicks=2,pickCount=0,gameOver=false,wonPrizes=[],cardData=[],highlightedCard=null;
let layout={scale:1,spread:150,stageH:340,deckH:240,revAreaH:180,revW:100,revCardH:140};

function getLayout(){
  const vw=window.innerWidth;
  const scale=vw<=360?0.63:vw<=414?0.73:vw<=480?0.81:vw<=600?0.91:1;
  const spread=vw<=360?128:vw<=414?138:vw<=480?148:vw<=600?158:168;
  return {
    scale,
    spread,
    stageH: Math.round(210 * scale),
    deckH: Math.round(160 * scale),
    revAreaH: Math.round(50 * scale),
    revW: Math.round(100 * scale),
    revCardH: Math.round(140 * scale),
  };
}

function applyLayout(){
  layout=getLayout();
  document.documentElement.style.setProperty('--cs',layout.scale);
  document.getElementById('stage').style.height=layout.stageH+'px';
  document.getElementById('deck-area').style.height=layout.deckH+'px';
  document.getElementById('revealed-area').style.height=layout.revAreaH+'px';
}

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function updateDots(){
  const dotsEl = document.getElementById("dots");
  while (dotsEl.children.length < totalPicks) {
    const d = document.createElement("div");
    d.className = "pick-dot";
    dotsEl.appendChild(d);
  }
  document.getElementById("picks-label").textContent = picksRemaining === 1 ? "pick remaining" : "picks remaining";
}

function setInstruction(t){document.getElementById("instruction").textContent=t;}

function showWinModal(){
  document.getElementById("modal-prizes").innerHTML=wonPrizes.map(p=>`<span class="prize-pill">${p.icon} ${p.label}${p.sub?" "+p.sub:""}</span>`).join("");
  const overlay=document.getElementById("modal-overlay"),box=document.getElementById("modal-box");
  overlay.style.display="flex";
  box.style.transform="scale(0.8)";box.style.opacity="0";
  setTimeout(()=>{box.style.transform="scale(1)";box.style.opacity="1";},30);
}

// Confetti burst when the win modal opens (visual only)
function spawnWinConfetti() {
  document.querySelectorAll('.confetti-layer').forEach(e => e.remove());
  const layer = document.createElement('div');
  layer.className = 'confetti-layer';
  document.body.appendChild(layer);
  const colors = ['#FFD65A','#FF8A2A','#FF4D8D','#FFF4D6','#7FD1A5','#FFC857','#5AC8FF'];
  const centerX = window.innerWidth / 2;
  for (let i = 0; i < 70; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    const startLeft = centerX + (Math.random() * 400 - 200);
    const dx = (Math.random() * 600 - 300).toFixed(0) + 'px';
    const dy = (500 + Math.random() * 400).toFixed(0) + 'px';
    const rot = (Math.random() * 1080 - 540).toFixed(0) + 'deg';
    const dur = (1800 + Math.random() * 1400).toFixed(0) + 'ms';
    const delay = (Math.random() * 250).toFixed(0) + 'ms';
    const w = (7 + Math.random() * 7).toFixed(0);
    const h = (11 + Math.random() * 10).toFixed(0);
    p.style.cssText =
      `left:${startLeft}px;background:${colors[i % colors.length]};` +
      `width:${w}px;height:${h}px;` +
      `--dx:${dx};--dy:${dy};--rot:${rot};--dur:${dur};--delay:${delay};`;
    layer.appendChild(p);
  }
  setTimeout(() => layer.remove(), 3600);
}
(function wrapShowWinModal() {
  if (typeof showWinModal !== 'function' || showWinModal.__wrapped) return;
  const orig = showWinModal;
  showWinModal = function() {
    const r = orig.apply(this, arguments);
    setTimeout(spawnWinConfetti, 60);
    return r;
  };
  showWinModal.__wrapped = true;
})();

function closeModal(){
  const box=document.getElementById("modal-box");
  box.style.transform="scale(0.8)";box.style.opacity="0";
  setTimeout(()=>{document.getElementById("modal-overlay").style.display="none";init();},350);
}

function flyCardToDot(cardEl, prize, angle, dotEl, onComplete) {
  if (!dotEl) { gsap.set(cardEl, {opacity:0}); if (onComplete) onComplete(); return; }
  const cardRect = cardEl.getBoundingClientRect();
  const dotRect = dotEl.getBoundingClientRect();
  const s = layout.scale;
  // Use actual card dimensions, not the inflated bounding box of the rotated element
  const W = Math.round(84 * s);
  const H = Math.round(118 * s);
  // Center of the card's rendered position (bounding rect center ≈ card centroid)
  const cardCX = cardRect.left + cardRect.width / 2;
  const cardCY = cardRect.top + cardRect.height / 2;

  const fly = document.createElement("div");
  fly.className = "fly-card";
  fly.style.cssText = `position:fixed;left:0;top:0;width:${W}px;height:${H}px;border-radius:10px;transform-style:preserve-3d;z-index:1000;pointer-events:none;`;

  const inner = document.createElement("div");
  inner.style.cssText = `position:absolute;inset:0;transform-style:preserve-3d;transition:transform 0.38s cubic-bezier(.4,0,.2,1);`;

  const back = document.createElement("div");
  back.style.cssText = `position:absolute;inset:0;border-radius:10px;background:repeating-linear-gradient(45deg,#2563eb,#2563eb 10px,#1d4ed8 10px,#1d4ed8 20px);border:2px solid #93c5fd;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;`;
  back.innerHTML = `<div style="width:60%;height:60%;border:2px solid #93c5fd;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#bfdbfe;font-size:${Math.round(26*s)}px">♠</div>`;

  const front = document.createElement("div");
  front.style.cssText = `position:absolute;inset:0;border-radius:10px;background:radial-gradient(120% 60% at 50% 0%,rgba(255,255,255,0.55),transparent 55%),linear-gradient(180deg,#FFF8DC 0%,#FFE7A1 38%,#FFC960 70%,#E59A2C 100%);border:1px solid rgba(255,244,196,0.9);transform:rotateY(180deg);backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:6px;text-align:center;overflow:hidden;box-shadow:0 0 0 2px rgba(184,115,20,0.35) inset,0 6px 18px rgba(0,0,0,0.35),0 0 22px rgba(255,200,90,0.35);color:#3a240a;font-family:'Manrope',system-ui,sans-serif;`;
  front.innerHTML = `<div style="font-size:0;line-height:1;margin-bottom:2px;filter:drop-shadow(0 1px 1px rgba(0,0,0,0.25))">${prize.icon}</div><div style="font-size:${Math.round(10*s)}px;font-weight:800;color:#2a1a06;line-height:1.25;text-align:center;text-transform:uppercase;letter-spacing:0.3px;font-family:'Manrope',sans-serif">${prize.label}</div>${prize.sub ? `<div style="font-size:${Math.round(9.5*s)}px;color:#5a3a10;font-weight:700;margin-top:2px;background:rgba(255,255,255,0.55);padding:1px 6px;border-radius:999px;border:1px solid rgba(120,70,10,0.25)">${prize.sub}</div>` : ''}${prize.extra ? `<div style="font-size:${Math.round(9*s)}px;color:#2a1a06;font-weight:800;margin-top:2px;background:rgba(255,255,255,0.6);padding:1px 5px;border-radius:6px">+ EXTRA PICK</div>` : ''}`;

  inner.appendChild(back);
  inner.appendChild(front);
  fly.appendChild(inner);
  document.body.appendChild(fly);

  gsap.set(fly, { x: cardCX - W / 2, y: cardCY - H / 2, rotation: angle, transformOrigin: "50% 50%" });
  gsap.set(cardEl, { opacity: 0 });

  const targetX = dotRect.left + (dotRect.width - W) / 2;
  const targetY = dotRect.top + (dotRect.height - H) / 2;

  gsap.to(fly, {
    x: targetX, y: targetY, rotation: 0, duration: 0.55, ease: "power3.inOut",
    onComplete: () => { fly.remove(); if (onComplete) onComplete(); }
  });

  setTimeout(() => { inner.style.transform = "rotateY(180deg)"; }, 200);
}

function liftCard(cardEl,angle){
  const rad=(angle-90)*Math.PI/180;
  const dist=Math.round((isTouchDevice()?76:58)*layout.scale);
  gsap.to(cardEl,{x:Math.cos(rad)*dist,y:Math.sin(rad)*dist,duration:0.2,ease:"power2.out"});
}
function lowerCard(cardEl){gsap.to(cardEl,{x:0,y:0,duration:0.2,ease:"power2.in"});}

function pickCard(cardEl, prize, angle) {
  if (gameOver || picksRemaining <= 0 || cardEl.classList.contains("picked")) return;
  if (highlightedCard && highlightedCard !== cardEl) { highlightedCard.classList.remove("highlighted"); lowerCard(highlightedCard); }
  highlightedCard = null;
  cardEl.classList.add("picked");

  const targetDot = document.querySelector("#dots .pick-dot:not(.in-flight):not(.filled)");
  if (targetDot) targetDot.classList.add("in-flight");

  wonPrizes.push(prize);
  pickCount++;
  const thisPick = pickCount;
  picksRemaining--;
  if (prize.extra) { picksRemaining++; totalPicks++; updateDots(); }

  flyCardToDot(cardEl, prize, angle, targetDot, () => {
    if (targetDot) {
      targetDot.classList.remove("in-flight");
      targetDot.classList.add("filled");
      targetDot.innerHTML = `<span class="pd-icon">${prize.icon}</span><span class="pd-name">${prize.label}</span>`;
    }
    updateDots();
    if (picksRemaining <= 0) {
      gameOver = true;
      setInstruction("All done! See your prizes below.");
      setTimeout(showWinModal, 1400);
    } else {
      setInstruction(prize.extra
        ? `Extra pick awarded! ${picksRemaining} pick${picksRemaining > 1 ? "s" : ""} remaining — choose your next card.`
        : `Nice! ${picksRemaining} pick${picksRemaining > 1 ? "s" : ""} remaining — choose your next card.`);
    }
  });
}

function init(){
  picksRemaining=2;totalPicks=2;pickCount=0;gameOver=false;wonPrizes=[];highlightedCard=null;
  setInstruction("Select two cards");
  document.querySelectorAll(".rev-card,.fly-card").forEach(e=>e.remove());
  const dotsEl=document.getElementById("dots");
  dotsEl.innerHTML="";
  for(let i=0;i<totalPicks;i++){const d=document.createElement("div");d.className="pick-dot";dotsEl.appendChild(d);}
  applyLayout();
  const deckArea=document.getElementById("deck-area");
  deckArea.innerHTML="";
  cardData=[];
  const prizes=shuffle(PRIZES);
  const total=prizes.length;
  const startAngle=-layout.spread/2;
  prizes.forEach((prize,i)=>{
    const card=document.createElement("div");
    card.className="card";
    const angle=startAngle+(layout.spread/(total-1))*i;
    gsap.set(card,{x:0,y:0,rotation:angle,transformOrigin:"bottom center"});
    const inner=document.createElement("div");inner.className="card-inner";
    const back=document.createElement("div");back.className="card-back";back.innerHTML=`<div class="card-back-pip">♠</div>`;
    const front=document.createElement("div");front.className="card-front";
    front.innerHTML=`<div class="prize-icon">${prize.icon}</div><div class="prize-name">${prize.label}</div>${prize.sub?`<div class="prize-val">${prize.sub}</div>`:""}${prize.extra?`<div class="prize-extra">+ EXTRA PICK</div>`:""}`;
    inner.appendChild(back);inner.appendChild(front);card.appendChild(inner);
    deckArea.appendChild(card);
    cardData.push({card,prize,angle});
    if(isTouchDevice()){
      card.addEventListener("click",()=>{
        if(gameOver||picksRemaining<=0||card.classList.contains("picked"))return;
        if(highlightedCard===card){pickCard(card,prize,angle);}
        else{if(highlightedCard){highlightedCard.classList.remove("highlighted");lowerCard(highlightedCard);}highlightedCard=card;card.classList.add("highlighted");liftCard(card,angle);setInstruction("Tap again to reveal this card!");}
      });
    } else {
      card.addEventListener("mouseenter",()=>{if(!card.classList.contains("picked")&&!gameOver)liftCard(card,angle);});
      card.addEventListener("mouseleave",()=>{if(!card.classList.contains("picked"))lowerCard(card);});
      card.addEventListener("click",()=>pickCard(card,prize,angle));
    }
  });
  updateDots();
}

let resizeTimer;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>{
    if(pickCount===0)init();
    else applyLayout();
  },200);
});

init();
</script>
</body>
</html>
